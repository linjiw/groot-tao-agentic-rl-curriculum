# SPDX-License-Identifier: Apache-2.0
# Typed knob registry for the SONIC Curriculum-Manager Agent (design doc 08 §5).
#
# Every knob the manager may touch, with hard bounds, max per-decision step,
# and cooldown. Anything NOT in this file is outside the action space.
# `verified_source` cites the pinned WBC submodule (0e35637) file the knob
# controls. `status`:
#   available — mechanism exists in stock SONIC config, mutable via config/override
#   patch     — requires the stage-2 curriculum patch applied first
#   design    — mechanism designed (docs/design/02/08) but not built; validator
#               rejects changes unless allow_design=true
#
# Step kinds: multiplicative (new/old within [1/factor, factor]),
#             additive (|new-old| <= step), notch (adjacent choice only).

meta:
  version: "0.1.0"
  design_doc: docs/design/08-curriculum-manager-agent.md
  submodule_pin: GR00T-WholeBodyControl 0e35637
  global_rules:
    max_changes_per_tick: 1
    default_action: none

knobs:
  # ── Family A — data curriculum (live-read by sampler at 200-step sync) ──
  uniform_sampling_rate:
    family: data_curriculum
    type: float
    config_path: motion_lib_cfg.adaptive_sampling.uniform_sampling_rate
    verified_source: gear_sonic/config/manager_env/commands/terms/motion.yaml:21
    mechanism: live-read by MotionLibBase.update_adaptive_sampling_probabilities (motion_lib_base.py:2558-2580)
    default: 0.1
    hard_range: [0.05, 0.5]
    max_step: {kind: multiplicative, factor: 1.5}
    cooldown_ticks: 2
    status: available
    notes: uniform floor; raise to fight forgetting/concentration, lower to sharpen

  adp_samp_failure_rate_max_over_mean:
    family: data_curriculum
    type: float
    config_path: motion_lib_cfg.adaptive_sampling.adp_samp_failure_rate_max_over_mean
    verified_source: gear_sonic/config/manager_env/commands/terms/motion.yaml:25 (default 50.0; sonic_release.yaml:71 overrides 200)
    mechanism: cap on per-bin failure rate at beta x mean before renorm (motion_lib_base.py:2570-2577)
    default: 50.0
    hard_range: [2.0, 500.0]
    max_step: {kind: multiplicative, factor: 2.0}
    cooldown_ticks: 2
    status: available
    notes: lower to damp gradient-variance / broken-mocap overfit, raise to sharpen on hard bins

  bin_size:
    family: data_curriculum
    type: choice
    config_path: motion_lib_cfg.adaptive_sampling.bin_size
    verified_source: gear_sonic/config/manager_env/commands/terms/motion.yaml:18
    mechanism: per-bin failure bookkeeping granularity (frames)
    default: 50
    choices: [25, 50, 100]
    max_step: {kind: notch}
    cooldown_ticks: 4
    status: available
    restart_required: true
    notes: changing mid-run resets bin statistics; only worth it early

  retire_replay_share:
    family: data_curriculum
    type: float
    config_path: (sampler subclass, Stage-4) retire/replay mix r
    verified_source: docs/design/02-curriculum-rl-plan.md Stage 4 (target seam motion_lib_base.py:2558-2580)
    mechanism: p = (1-u-r)*active + u*uniform + r*replay
    default: 0.0
    hard_range: [0.0, 0.1]
    max_step: {kind: additive, step: 0.02}
    cooldown_ticks: 3
    status: design

  # ── Family B — competence-gated schedules ──
  termination_threshold.anchor_pos:
    family: schedule
    type: float
    config_path: terminations.anchor_pos.params.threshold
    verified_source: gear_sonic/config/manager_env/terminations/tracking/base_adaptive_strict_ori_foot_xyz.yaml:18 (strict 0.15)
    mechanism: stage-2 step_curriculum slot / IsaacLab modify_term_cfg (reads params.threshold live, termination_manager.py:167)
    default: 0.30
    hard_range: [0.15, 0.5]
    max_step: {kind: additive, step: 0.05}
    cooldown_ticks: 3
    status: patch
    notes: tighten (decrease) only on sustained held-out success >= t_H; loosen on <= t_L

  termination_threshold.ee_body_pos:
    family: schedule
    type: float
    config_path: terminations.ee_body_pos.params.threshold
    verified_source: gear_sonic/config/manager_env/terminations/tracking/base_adaptive_strict_ori_foot_xyz.yaml:22 (strict 0.15)
    mechanism: stage-2 step_curriculum slot / modify_term_cfg
    default: 0.30
    hard_range: [0.15, 0.5]
    max_step: {kind: additive, step: 0.05}
    cooldown_ticks: 3
    status: patch

  termination_threshold.foot_pos_xyz:
    family: schedule
    type: float
    config_path: terminations.foot_pos_xyz.params.threshold
    verified_source: gear_sonic/config/manager_env/terminations/tracking/base_adaptive_strict_ori_foot_xyz.yaml:14 (strict 0.2)
    mechanism: stage-2 step_curriculum slot / modify_term_cfg
    default: 0.35
    hard_range: [0.2, 0.5]
    max_step: {kind: additive, step: 0.05}
    cooldown_ticks: 3
    status: patch

  dr_push_scale:
    family: schedule
    type: float
    config_path: event_manager.cfg.push_robot.params.velocity_range (scale)
    verified_source: docs/design/02-curriculum-rl-plan.md Stage 3 (force_push_linear_curriculum slot, modular_tracking_env_cfg.py)
    mechanism: modify_env_param curriculum slot (Stage-3, not yet built)
    default: 1.0
    hard_range: [0.3, 1.0]
    max_step: {kind: additive, step: 0.1}
    cooldown_ticks: 3
    status: design

  penalty_weight_scale.feet_acc:
    family: schedule
    type: float
    config_path: schedule_dict -> feet_acc reward weight (segment endpoint)
    verified_source: gear_sonic/trl/utils/scheduler.py:296-353 (update_scheduled_params), consumed ppo_trainer.py:1703-1706
    mechanism: schedule_dict segment-endpoint edit applied from checkpoint restart
    default: 1.0
    hard_range: [0.0, 2.0]
    max_step: {kind: additive, step: 0.25}
    cooldown_ticks: 4
    status: design

  penalty_weight_scale.action_rate_l2:
    family: schedule
    type: float
    config_path: schedule_dict -> action_rate_l2 reward weight (segment endpoint)
    verified_source: gear_sonic/trl/utils/scheduler.py:296-353
    mechanism: schedule_dict segment-endpoint edit
    default: 1.0
    hard_range: [0.0, 2.0]
    max_step: {kind: additive, step: 0.25}
    cooldown_ticks: 4
    status: design

  # ── Family C — optimizer meta-parameters (rarely touched; KL-LR is the fast loop) ──
  desired_kl:
    family: optimizer
    type: float
    config_path: algo.config.desired_kl
    verified_source: gear_sonic/config/algo/ppo_im_phc.yaml:22 (default 0.01)
    mechanism: setpoint of the KL-adaptive LR controller (ppo_trainer.py:2142-2166)
    default: 0.01
    hard_range: [0.005, 0.02]
    max_step: {kind: multiplicative, factor: 1.5}
    cooldown_ticks: 4
    status: available

  entropy_coef:
    family: optimizer
    type: float
    config_path: algo.config.entropy_coef
    verified_source: gear_sonic/config/algo/ppo_im_phc.yaml:16 (default 0.01)
    mechanism: PPO entropy bonus weight
    default: 0.01
    hard_range: [0.0025, 0.04]
    max_step: {kind: multiplicative, factor: 2.0}
    cooldown_ticks: 4
    status: available

  kl_lr.min_learning_rate:
    family: optimizer
    type: float
    config_path: KL-LR controller clamp lower bound
    verified_source: experiments/reverse-transfer-lr-curriculum/kl_adaptive_lr.py (port of ppo_trainer.py:2142-2166)
    mechanism: clamp on the adaptive-LR controller output
    default: 1.0e-5
    hard_range: [1.0e-6, 5.0e-5]
    max_step: {kind: multiplicative, factor: 2.0}
    cooldown_ticks: 4
    status: available

  kl_lr.max_learning_rate:
    family: optimizer
    type: float
    config_path: KL-LR controller clamp upper bound
    verified_source: experiments/reverse-transfer-lr-curriculum/kl_adaptive_lr.py
    mechanism: clamp on the adaptive-LR controller output
    default: 2.0e-4
    hard_range: [5.0e-5, 1.0e-3]
    max_step: {kind: multiplicative, factor: 2.0}
    cooldown_ticks: 4
    status: available
