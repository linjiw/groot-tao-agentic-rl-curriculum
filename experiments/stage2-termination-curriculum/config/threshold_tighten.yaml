# Stage-2 curriculum: progressively tighten termination thresholds.
#
# Drop into: gear_sonic/config/manager_env/curriculum/threshold_tighten.yaml
# Select with: `manager_env/curriculum=threshold_tighten` (or set as the default
# in base_env.yaml).
#
# Each term uses IsaacLab's `modify_term_cfg` (re-exported into the gear_sonic mdp
# namespace via `from isaaclab.envs.mdp import *`). The `address` uses the `s.`
# shorthand: the first `terminations.` is rewritten to `termination_manager.cfg.`.
#
# `modify_fn` is left null here on purpose — YAML cannot carry a Python callable.
# The hardcoded injection block in modular_tracking_env_cfg.py fills it in at
# config-build time (see the accompanying patch). We bind `step_curriculum_nochange`,
# which returns modify_env_param.NO_CHANGE between milestones to avoid a redundant
# per-step setter write.
#
# Thresholds start loose (survivable long episodes) and tighten to the strict
# values used by base_adaptive_strict_ori_foot_xyz. num_steps milestones are
# placeholders keyed to env.common_step_counter — tune to total iterations.

_target_: gear_sonic.envs.manager_env.mdp.curriculum.CurriculumCfg

anchor_pos_threshold_curriculum:
  _target_: isaaclab.managers.CurriculumTermCfg
  func: gear_sonic.envs.manager_env.mdp:modify_term_cfg
  params:
    address: "terminations.anchor_pos.params.threshold"
    modify_fn: null            # injected: step_curriculum_nochange
    modify_params:
      values: [0.30, 0.22, 0.15]
      num_steps: [0, 30000, 80000]

ee_body_pos_threshold_curriculum:
  _target_: isaaclab.managers.CurriculumTermCfg
  func: gear_sonic.envs.manager_env.mdp:modify_term_cfg
  params:
    address: "terminations.ee_body_pos.params.threshold"
    modify_fn: null            # injected: step_curriculum_nochange
    modify_params:
      values: [0.30, 0.22, 0.15]
      num_steps: [0, 30000, 80000]

foot_pos_xyz_threshold_curriculum:
  _target_: isaaclab.managers.CurriculumTermCfg
  func: gear_sonic.envs.manager_env.mdp:modify_term_cfg
  params:
    address: "terminations.foot_pos_xyz.params.threshold"
    modify_fn: null            # injected: step_curriculum_nochange
    modify_params:
      values: [0.35, 0.28, 0.20]
      num_steps: [0, 30000, 80000]
